name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Checkout vbwd-fe-user
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-user
          path: vbwd-fe-user
          submodules: recursive

      - name: Overlay plugin source
        run: cp -r plugin-src/. vbwd-fe-user/plugins/yookassa-payment/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vbwd-fe-user/package-lock.json

      - name: Build vbwd-fe-core submodule
        run: |
          cd vbwd-fe-user/vbwd-fe-core
          npm install
          npm run build

      - name: Install dependencies
        run: |
          cd vbwd-fe-user
          npm install

      - name: Run plugin tests
        run: |
          cd vbwd-fe-user
          if find plugins/yookassa-payment -name "*.spec.ts" -o -name "*.test.ts" | grep -q .; then
            npx vitest run plugins/yookassa-payment --reporter=verbose
          else
            echo "No tests found for yookassa-payment — skipping."
          fi

  integration:
    name: Integration — yookassa-payment (fe-user)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Checkout vbwd-fe-user
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-user
          path: vbwd-fe-user
          submodules: recursive

      - name: Overlay plugin source
        run: cp -r plugin-src/. vbwd-fe-user/plugins/yookassa-payment/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vbwd-fe-user/package-lock.json

      - name: Build vbwd-fe-core submodule
        run: |
          cd vbwd-fe-user/vbwd-fe-core
          npm install
          npm run build

      - name: Install dependencies
        run: |
          cd vbwd-fe-user
          npm install

      - name: Install ALL plugins
        run: |
          cd vbwd-fe-user/plugins
          for entry in "booking:vbwd-fe-user-plugin-booking" "chat:vbwd-fe-user-plugin-chat" "checkout:vbwd-fe-user-plugin-checkout" "cms:vbwd-fe-user-plugin-cms" "ghrm:vbwd-fe-user-plugin-ghrm" "landing1:vbwd-fe-user-plugin-landing1" "paypal-payment:vbwd-fe-user-plugin-paypal-payment" "stripe-payment:vbwd-fe-user-plugin-stripe-payment" "taro:vbwd-fe-user-plugin-taro" "theme-switcher:vbwd-fe-user-plugin-theme-switcher" "yookassa-payment:vbwd-fe-user-plugin-yookassa-payment"; do
            name="${entry%%:*}"; repo="${entry##*:}"
            [ -d "$name" ] && continue
            git clone --depth=1 -q "https://github.com/VBWD-platform/${repo}.git" "$name" 2>/dev/null || echo "Skipping $name"
          done

      - name: Run integration tests
        working-directory: vbwd-fe-user
        run: ./bin/pre-commit-check.sh --plugin yookassa-payment --integration
